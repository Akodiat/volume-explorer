<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIM Volume Explorer</title>
    <link 
      rel="stylesheet" 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css" />
  </head>
  
  <body>
    <div class="flex-layout">
      <div id="controls-panel" class="panel">
        <div class="mb-2">
          <form id="source-form" class="row g-2 align-items-center">
            <label for="source-url-input" class="col-12 col-form-label">Source</label>
            <div class="col-12 col-sm">
              <input id="source-url-input" type="text" class="form-control" placeholder="Paste URL" />
            </div>
            <div class="col-12 col-sm-auto d-grid">
              <button id="source-load-button" class="btn btn-outline-secondary" type="submit">Load</button>
            </div>
          </form>
          <p id="source-error" class="mt-2 mb-0"></p>
        </div>

        <div class="mt-1 mb-2">
          <div class="row row-cols-1 row-cols-lg-2 g-3 mb-2">
            <div class="col">
              <div class="d-flex align-items-center justify-content-between gap-2 flex-nowrap">
                <label for="backgroundColor" class="col-form-label mb-0 text-nowrap">Background</label>
                <input type="color" id="backgroundColor" class="form-control form-control-color flex-shrink-0" value="#000000" title="Background color" />
              </div>
            </div>
            <div class="col">
              <div class="d-flex align-items-center justify-content-between gap-2 flex-nowrap">
                <label for="objectColor" class="col-form-label mb-0 text-nowrap">Foreground</label>
                <input type="color" id="objectColor" class="form-control form-control-color flex-shrink-0" value="#ffffff" title="Foreground color" />
              </div>
            </div>
          </div>

          <div class="row row-cols-1 row-cols-lg-2 g-3">
            <div class="col">
              <div class="d-flex align-items-center justify-content-between gap-2 flex-nowrap">
                <label for="showBoundingBox" class="col-form-label mb-0 text-nowrap">Bounds</label>
                <div class="d-flex align-items-center gap-2 flex-nowrap">
                  <input type="color" id="boundingBoxColor" class="form-control form-control-color flex-shrink-0" value="#ffff00" title="Bounding box color" />
                  <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" role="switch" id="showBoundingBox" aria-label="Toggle bounding box" />
                  </div>
                </div>
              </div>
            </div>
            <div class="col">
              <div class="d-flex align-items-center justify-content-between gap-2 flex-nowrap">
                <label for="axisBtn" class="col-form-label mb-0 text-nowrap">Axes</label>
                <div class="form-check form-switch mb-0">
                  <input class="form-check-input" type="checkbox" role="switch" id="axisBtn" aria-label="Toggle axes" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-2 mb-2">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <span>Cropping</span>
            <button id="crop-reset-button" type="button" class="btn btn-outline-secondary btn-sm">Reset</button>
          </div>

          <div class="vstack gap-2">
            <div class="d-flex align-items-center gap-2 flex-nowrap">
              <label for="crop-x-min" class="col-form-label fw-semibold mb-0 text-nowrap">X</label>
              <div class="flex-grow-1">
                <div class="crop-merged-slider">
                  <div class="crop-track"></div>
                  <div id="crop-x-fill" class="crop-fill"></div>
                  <input id="crop-x-min" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="0" />
                  <input id="crop-x-max" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="1" />
                </div>
              </div>
            </div>

            <div class="d-flex align-items-center gap-2 flex-nowrap">
              <label for="crop-y-min" class="col-form-label fw-semibold mb-0 text-nowrap">Y</label>
              <div class="flex-grow-1">
                <div class="crop-merged-slider">
                  <div class="crop-track"></div>
                  <div id="crop-y-fill" class="crop-fill"></div>
                  <input id="crop-y-min" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="0" />
                  <input id="crop-y-max" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="1" />
                </div>
              </div>
            </div>

            <div class="d-flex align-items-center gap-2 flex-nowrap">
              <label for="crop-z-min" class="col-form-label fw-semibold mb-0 text-nowrap">Z</label>
              <div class="flex-grow-1">
                <div class="crop-merged-slider">
                  <div class="crop-track"></div>
                  <div id="crop-z-fill" class="crop-fill"></div>
                  <input id="crop-z-min" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="0" />
                  <input id="crop-z-max" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="1" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-2 mb-2">
          <div class="row row-cols-1 g-2">
            <div class="col">
              <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center gap-2">
                <label for="ome-zarr-scale-select" class="col-form-label mb-0 text-nowrap">
                  Scale level
                  <span class="text-muted">(<span id="ome-zarr-scale-level-value">-</span>)</span>
                </label>
                <select id="ome-zarr-scale-select" class="form-select form-select-sm w-auto ms-md-auto">
                  <option value="auto" selected>Auto</option>
                </select>
              </div>
            </div>
          </div>
          <p id="scale-error" class="mt-2 mb-0"></p>
        </div>

      
        <div class="border rounded-2 overflow-hidden">
          <canvas id="histogram-canvas" width="2048px" height="1024px"></canvas>
        </div>

        <div class="mt-2">
          <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center gap-2">
            <label for="global-opacity-slider" class="col-form-label mb-0 text-nowrap">Global opacity</label>
            <input
              id="global-opacity-slider"
              class="form-range opacity-range w-100 ms-md-auto"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="1"
            />
          </div>
        </div>
        <div class="hidden">
          <p style="margin: 2px">
            <button id="colorize">Colorize</button>
            <input id="segchannel" type="number" min="0" max="10" step="1" value="0" />
            <select name="Colormap" id="colormap">https%3A%2F%2Fplatform.qim.dk%2Fqim-public%2FLentils%2Flentils.zarr
              <option value="viridis" selected>viridis</option>
              <option value="plasma">plasma</option>
            </select>
            <select name="Feature" id="feature">
              <option value="feature1" selected>f1</option>
              <option value="feature2">f2</option>
            </select>
            <input id="featmin" type="range" min="0" max="100" step="1" value="0" />
            <input id="featmax" type="range" min="0" max="100" step="1" value="100" />
          </p>
          <p style="margin: 2px">
            <button id="X">X</button>
            <button id="Y">Y</button>
            <button id="Z">Z</button>
            <button id="3D">3D</button>
            <button id="rotBtn">Turntable</button>
            <button id="xfBtn">Align</button>
            <button id="resetCamBtn">ResetCam</button>
            <select name="Render mode" id="renderMode">
              <option value="RM" selected>Volumetric</option>
              <option value="PT">Pathtrace</option>
              <option value="MP">Max project</option>
            </select>
            <button id="interpolateBtn">Interpolate</button>
            <button id="screenshotBtn">Screenshot</button>
          </p>

          <p>Pathtrace iterations: <span id="counter">0</span></p>

          <p>
            <label for="gammaMin">Gamma Min</label>
            <input id="gammaMin" type="number" min="0" max="255" step="1" value="0" />
            <label for="gammaScale">Gamma Scale</label>
            <input id="gammaScale" type="number" min="0" max="255" step="1" value="128" />
            <label for="gammaMax">Gamma Max</label>
            <input id="gammaMax" type="number" min="0" max="255" step="1" value="255" />
          </p>

          <p style="margin: 2px">
            <button id="flipXBtn">FlipX</button>
            <button id="flipYBtn">FlipY</button>
            <button id="flipZBtn">FlipZ</button>
            <label for="zSlider">Z-Slice</label>
            <button id="zbackBtn">Z Back</button>
            <button id="zforwardBtn">Z Forward</button>
            <input id="zSlider" type="range" min="0" max="0" step="1" value="0" />
            <input type="number" id="zValue" min="0" max="0" value="0" />
          </p>

          <button id="playBtn">Play</button>
          <button id="pauseBtn">Pause</button>
          <button id="backBtn">Back</button>
          <button id="forwardBtn">Forward</button>
          <input id="timeSlider" type="range" min="0" max="0" step="1" value="0" />
          <input type="number" id="timeValue" min="0" max="0" value="0" />
          <input type="number" id="sceneValue" min="0" max="0" value="0" />
        </div>
      </div>
      <div id="viewer-panel" class="panel"></div>
    </div>
  </body>
  <script type="module" src="index.ts"></script>
</html>
